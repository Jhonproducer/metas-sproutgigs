<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jhonproducer - High Contrast Dashboard</title>
    <style>
        :root {
            --bg: #000000; --card: #161b22; --text: #ffffff;
            --green: #2eb043; --red: #ff4444; --yellow: #ffcc00; --blue: #58a6ff;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Arial Black', Gadget, sans-serif; /* Fuente gruesa por defecto */
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
            font-weight: 900; /* TODO EN NEGRITAS MÁXIMAS */
        }
        .card { 
            background: var(--card); border: 3px solid #30363d;
            border-radius: 20px; padding: 25px; width: 440px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        /* Cabecera */
        .header { border-bottom: 2px solid #30363d; padding-bottom: 10px; margin-bottom: 15px; }
        .day-label { color: var(--blue); font-size: 1.3rem; letter-spacing: 1px; display: block; }
        
        /* Dinero Grande */
        .big-money { font-size: 5.5rem; margin: 10px 0; line-height: 1; }
        .info-msg { font-size: 1.2rem; margin-bottom: 10px; }

        /* Barra de Progreso Gruesa */
        .progress-bar { background: #333; border-radius: 15px; height: 20px; margin: 15px 0; border: 2px solid #555; }
        #fill { height: 100%; width: 0%; transition: width 1s ease; }

        /* Cuadrícula de Saldos */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .box { background: #000; padding: 12px; border-radius: 10px; border: 2px solid #444; }
        .label { font-size: 0.75rem; color: #aaa; text-transform: uppercase; display: block; }
        .val { font-size: 1.2rem; display: block; }

        /* HISTORIAL SIEMPRE VISIBLE */
        .history-box { 
            background: #000; border: 2px solid #30363d; 
            border-radius: 12px; padding: 12px; margin-top: 15px;
            max-height: 120px; overflow-y: auto;
        }
        .hist-item { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 5px 0; border-bottom: 1px solid #222; }

        input { background: #222; border: 2px solid var(--blue); color: #fff; width: 80px; text-align: center; font-size: 1.3rem; font-weight: 900; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <span id="txtDia" class="day-label">CARGANDO...</span>
            <span id="txtDateTime" style="font-size: 1rem; color: #8b949e;">--/--/-- | --:--</span>
        </div>

        <div style="text-align: center;">
            <span style="font-size: 0.9rem; color: #aaa;">GANADO HOY:</span>
            <div class="big-money" id="gananciaHoy" style="color: var(--red);">$0.00</div>
            <div id="message" class="info-msg" style="color: var(--yellow);">Faltan $1.00</div>
        </div>

        <div class="progress-bar"><div id="fill"></div></div>

        <div class="stats-grid">
            <div class="box"><span class="label">EN GANADO</span><span class="val" id="valEarned">$0.00</span></div>
            <div class="box"><span class="label">PENDIENTE</span><span class="val" id="valPending">$0.00</span></div>
            <div class="box" style="grid-column: span 2; border-color: var(--green);">
                <span class="label" style="color: var(--green);">SALDO TOTAL REAL</span>
                <span class="val" id="valTotalReal" style="font-size: 1.6rem; color: var(--green);">$0.00</span>
            </div>
        </div>

        <div class="history-box">
            <div style="text-align: center; font-size: 0.7rem; color: #58a6ff; margin-bottom: 5px;">HISTORIAL ÚLTIMOS DÍAS</div>
            <div id="historyList"></div>
        </div>

        <div style="margin-top: 15px; font-size: 0.9rem; text-align: center;">
            META: $ <input type="number" id="goal" value="1.00" step="0.10">
            <span onclick="document.getElementById('cashSound').play()" style="cursor:pointer; display:block; font-size:0.7rem; margin-top:5px; color:#58a6ff;">🔊 PROBAR SONIDO</span>
        </div>
    </div>

    <audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>

    <script>
        function getVzlaData() {
            const ahora = new Date();
            const vzla = new Date(ahora.getTime() + (ahora.getTimezoneOffset() * 60000) - (4 * 3600000));
            const dias = ["DOMINGO", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"];
            let h = vzla.getHours();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            const m = vzla.getMinutes().toString().padStart(2, '0');
            return { id: vzla.toISOString().split('T')[0], dia: dias[vzla.getDay()], fecha: vzla.toLocaleDateString('es-VE'), hora: `${h}:${m} ${ampm}` };
        }

        const info = getVzlaData();
        document.getElementById('txtDia').innerText = info.dia;
        document.getElementById('txtDateTime').innerText = `${info.fecha} | ${info.hora}`;

        const params = new URLSearchParams(window.location.search);
        const earned = parseFloat(params.get('earned')) || 0;
        const pending = parseFloat(params.get('pending')) || 0;
        const totalActual = earned + pending;

        let base = parseFloat(localStorage.getItem('baseJhon'));
        let ultimaFecha = localStorage.getItem('fechaJhon');
        let historial = JSON.parse(localStorage.getItem('histJhon')) || [];

        // Lógica de Historia: Si hoy es un día nuevo, guarda lo de ayer
        if (ultimaFecha && ultimaFecha !== info.id) {
            const ganadoAyer = Math.max(0, totalActual - base);
            const metaAyer = parseFloat(localStorage.getItem('metaJhon')) || 1.00;
            const cumplido = ganadoAyer >= metaAyer;
            
            historial.unshift({ f: ultimaFecha, m: ganadoAyer.toFixed(2), ok: cumplido });
            if(historial.length > 5) historial.pop();
            localStorage.setItem('histJhon', JSON.stringify(historial));
            
            base = totalActual;
            localStorage.setItem('baseJhon', base);
        }
        if (!base) { base = totalActual; localStorage.setItem('baseJhon', base); }
        localStorage.setItem('fechaJhon', info.id);

        function calcular() {
            const goal = parseFloat(document.getElementById('goal').value) || 1.00;
            localStorage.setItem('metaJhon', goal);

            const ganadoHoy = Math.max(0, totalActual - base);
            const hoyRedondeo = Math.round(ganadoHoy * 100) / 100;

            // Sonido
            const ant = parseFloat(localStorage.getItem('antJhon')) || 0;
            if (hoyRedondeo > ant) { document.getElementById('cashSound').play().catch(e=>{}); }
            localStorage.setItem('antJhon', hoyRedondeo);

            // UI
            const bigNum = document.getElementById('gananciaHoy');
            bigNum.innerText = '$' + hoyRedondeo.toFixed(2);
            document.getElementById('valEarned').innerText = '$' + earned.toFixed(4);
            document.getElementById('valPending').innerText = '$' + pending.toFixed(4);
            document.getElementById('valTotalReal').innerText = '$' + totalActual.toFixed(4);

            const pct = Math.min((ganadoHoy / goal) * 100, 100);
            const fill = document.getElementById('fill');
            fill.style.width = pct + '%';

            // Colores
            if(pct < 35) { fill.style.backgroundColor = "#da3633"; bigNum.style.color = "#da3633"; }
            else if(pct < 75) { fill.style.backgroundColor = "#ffcc00"; bigNum.style.color = "#ffcc00"; }
            else { fill.style.backgroundColor = "#2eb043"; bigNum.style.color = "#2eb043"; }

            document.getElementById('message').innerText = ganadoHoy >= goal ? "META LOGRADA! 🏆" : `FALTAN $${(goal - ganadoHoy).toFixed(2)}`;
            document.getElementById('message').style.color = ganadoHoy >= goal ? "#2eb043" : "#ffcc00";

            // Mostrar Historial
            const list = document.getElementById('historyList');
            if(historial.length > 0) {
                list.innerHTML = historial.map(h => `
                    <div class="hist-item">
                        <span>${h.f}</span>
                        <b style="color:${h.ok ? '#2eb043' : '#ff4444'}">$${h.m} ${h.ok ? '✓' : '✗'}</b>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<div style="text-align:center;color:#444">SIN REGISTROS</div>';
            }
        }

        document.getElementById('goal').value = localStorage.getItem('metaJhon') || 1.00;
        document.getElementById('goal').addEventListener('input', calcular);
        calcular();
    </script>
</body>
</html>
