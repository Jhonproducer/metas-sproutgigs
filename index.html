<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jhonproducer - Master Dashboard 2026</title>
    <style>
        :root {
            --bg: #000000; --card: #161b22; --text: #ffffff;
            --green: #2eb043; --red: #ff4444; --yellow: #ffcc00; --blue: #58a6ff; --border: #30363d;
        }
        [data-theme="light"] {
            --bg: #ffffff; --card: #f6f8fa; --text: #000000;
            --green: #1a7f37; --red: #cf222e; --yellow: #9a6700; --blue: #0969da; --border: #d0d7de;
        }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Arial Black', Gadget, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
            font-weight: 900;
        }
        .card { 
            background: var(--card); border: 4px solid var(--border);
            border-radius: 20px; padding: 20px; width: 460px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .big-money { font-size: 5rem; line-height: 1; margin: 10px 0; text-align: center; }
        
        details { background: var(--bg); border: 2px solid var(--border); border-radius: 10px; margin-top: 8px; }
        summary { padding: 10px; cursor: pointer; color: var(--blue); font-size: 0.9rem; outline: none; text-transform: uppercase; }
        .content { padding: 10px; border-top: 2px solid var(--border); max-height: 180px; overflow-y: auto; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .box { border: 2px solid var(--border); padding: 10px; border-radius: 8px; text-align: center; }
        .label { font-size: 0.75rem; color: #8b949e; display: block; text-transform: uppercase; }
        
        input { background: var(--card); border: 3px solid var(--blue); color: var(--text); width: 85px; text-align: center; font-size: 1.5rem; font-weight: 900; border-radius: 8px; outline: none; }
        .btn-theme { background: var(--blue); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 900; font-size: 0.8rem; }
        
        .progress-bar { background: #333; border-radius: 10px; height: 20px; margin: 10px 0; overflow: hidden; border: 1px solid #555; }
        #fill { height: 100%; width: 0%; transition: width 1s ease; }

        .month-header { background: var(--border); color: var(--text); padding: 6px; font-size: 0.8rem; margin-top: 10px; border-radius: 4px; text-align: center; letter-spacing: 1px; }
        .hist-item { display:flex; justify-content:space-between; padding:6px 5px; border-bottom:1px solid var(--border); font-size: 0.9rem; }
    </style>
</head>
<body data-theme="dark">
    <div class="card">
        <div class="top-bar">
            <div>
                <span id="txtDia" style="color: var(--blue); font-size: 1.3rem; display: block;">---</span>
                <span id="txtDateTime" style="font-size: 1rem;">--/--/-- | --:--</span>
            </div>
            <button class="btn-theme" onclick="toggleTheme()">TEMA 🌓</button>
        </div>

        <div style="text-align: center; margin-top: 10px;">
            <span id="labelHoy" style="font-size: 0.9rem; letter-spacing: 1px;">GANADO HOY:</span>
            <div class="big-money" id="gananciaHoy">$0.00</div>
            <div id="message" style="font-size: 1.2rem; margin-bottom: 5px;">---</div>
            <div class="progress-bar"><div id="fill"></div></div>
        </div>

        <div class="grid">
            <div class="box"><span class="label">GANADO</span><span id="valEarned" style="font-size: 1.2rem;">$0.00</span></div>
            <div class="box"><span class="label">PENDIENTE</span><span id="valPending" style="font-size: 1.2rem;">$0.00</span></div>
            <div class="box" style="grid-column: span 2; border-color: var(--green); background: rgba(46, 176, 67, 0.05);">
                <span class="label" style="color: var(--green); font-weight: 900;">SALDO TOTAL REAL</span>
                <span id="valTotalReal" style="font-size: 1.8rem; color: var(--green);">$0.00</span>
            </div>
        </div>

        <details>
            <summary>📊 HISTORIAL Y ACUMULADO</summary>
            <div class="content">
                <div style="display:flex; justify-content:space-between; margin-bottom: 8px; padding: 8px; background: var(--green); color: white; border-radius: 8px;">
                    <span>TOTAL MES ACTUAL:</span> <b id="valMes">$0.00</b>
                </div>
                <div id="historyList"></div>
            </div>
        </details>

        <details>
            <summary>💰 CALCULADORA DE RETIRO</summary>
            <div class="content">
                META DE RETIRO: $ <input type="number" id="withdrawTarget" value="13.00">
                <div id="withdrawRemaining" style="margin-top: 12px; color: var(--yellow); font-size: 1.2rem; text-align: center;">---</div>
            </div>
        </details>

        <div style="margin-top: 15px; text-align: center; font-size: 1rem;">
            META DIARIA: $ <input type="number" id="goal" value="1.00" step="0.10">
            <span onclick="testSound()" style="cursor:pointer; display:block; color: var(--blue); font-size: 0.8rem; margin-top: 8px; text-decoration: underline;">🔊 PROBAR SONIDO (KA-CHING)</span>
        </div>
    </div>

    <audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>

    <script>
        function toggleTheme() {
            const b = document.body;
            const t = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            b.setAttribute('data-theme', t);
            localStorage.setItem('jhonTheme', t);
        }

        const MESES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

        function getVzlaData() {
            const ahora = new Date();
            const vzla = new Date(ahora.getTime() + (ahora.getTimezoneOffset() * 60000) - (4 * 3600000));
            const dias = ["DOMINGO", "LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO"];
            let h = vzla.getHours();
            const am = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            const m = vzla.getMinutes().toString().padStart(2, '0');
            return { 
                id: vzla.toISOString().split('T')[0], 
                mesIdx: vzla.getMonth(),
                anio: vzla.getFullYear(),
                diaNom: dias[vzla.getDay()], 
                fecha: vzla.toLocaleDateString('es-VE'), 
                hora: `${h}:${m} ${am}` 
            };
        }

        const info = getVzlaData();
        document.getElementById('txtDia').innerText = info.diaNom;
        document.getElementById('txtDateTime').innerText = `${info.fecha} | ${info.hora}`;
        document.body.setAttribute('data-theme', localStorage.getItem('jhonTheme') || 'dark');

        const params = new URLSearchParams(window.location.search);
        const earned = parseFloat(params.get('earned')) || 0;
        const pending = parseFloat(params.get('pending')) || 0;
        const totalActual = earned + pending;

        let base = parseFloat(localStorage.getItem('baseJhon'));
        let ultimaFecha = localStorage.getItem('fechaJhon');
        let historial = JSON.parse(localStorage.getItem('histJhon')) || [];

        // Lógica de cierre de día
        if (ultimaFecha && ultimaFecha !== info.id) {
            const ganadoAyer = Math.max(0, totalActual - base);
            const d = new Date(ultimaFecha + "T12:00:00");
            historial.unshift({ 
                f: ultimaFecha, 
                m: ganadoAyer.toFixed(2), 
                mes: d.getMonth(), 
                anio: d.getFullYear() 
            });
            if(historial.length > 90) historial.pop();
            localStorage.setItem('histJhon', JSON.stringify(historial));
            base = totalActual;
            localStorage.setItem('baseJhon', base);
        }
        if (!base) { base = totalActual; localStorage.setItem('baseJhon', base); }
        localStorage.setItem('fechaJhon', info.id);

        function calcular() {
            const goal = parseFloat(document.getElementById('goal').value) || 1.00;
            const wTarget = parseFloat(document.getElementById('withdrawTarget').value) || 13.00;
            localStorage.setItem('metaJhon', goal);
            localStorage.setItem('retiroJhon', wTarget);

            const ganadoHoy = Math.max(0, totalActual - base);
            const hoyRedondeo = Math.round(ganadoHoy * 100) / 100;

            const ant = parseFloat(localStorage.getItem('antJhon')) || 0;
            if (hoyRedondeo > ant) { document.getElementById('cashSound').play().catch(e=>{}); }
            localStorage.setItem('antJhon', hoyRedondeo);

            document.getElementById('gananciaHoy').innerText = '$' + hoyRedondeo.toFixed(2);
            document.getElementById('valEarned').innerText = '$' + earned.toFixed(4);
            document.getElementById('valPending').innerText = '$' + pending.toFixed(4);
            document.getElementById('valTotalReal').innerText = '$' + totalActual.toFixed(4);

            // Suma Mes Actual
            const sumMesActual = historial
                .filter(h => h.mes === info.mesIdx && h.anio === info.anio)
                .reduce((acc, h) => acc + parseFloat(h.m), 0) + hoyRedondeo;
            
            document.getElementById('valMes').innerText = '$' + sumMesActual.toFixed(2);
            document.getElementById('labelHoy').innerText = `GANADO HOY (${MESES[info.mesIdx]}):`;

            // Retiro
            const faltaW = Math.max(0, wTarget - totalActual);
            document.getElementById('withdrawRemaining').innerText = faltaW > 0 ? `FALTAN $${faltaW.toFixed(2)} PARA RETIRAR` : "¡LISTO PARA RETIRAR! 🔥";

            // Barra
            const pct = Math.min((ganadoHoy / goal) * 100, 100);
            const fill = document.getElementById('fill');
            const bigNum = document.getElementById('gananciaHoy');
            fill.style.width = pct + '%';
            if(pct < 35) { fill.style.backgroundColor = "#ff4444"; bigNum.style.color = "#ff4444"; }
            else if(pct < 75) { fill.style.backgroundColor = "#ffcc00"; bigNum.style.color = "#ffcc00"; }
            else { fill.style.backgroundColor = "#2eb043"; bigNum.style.color = "#2eb043"; }

            document.getElementById('message').innerText = ganadoHoy >= goal ? "META LOGRADA! 🏆" : `FALTAN $${(goal - ganadoHoy).toFixed(2)}`;
            
            // Historial Agrupado (FIX de Undefined)
            let htmlHist = "";
            let ultimoMesAnio = "";
            
            historial.forEach(h => {
                let nombreMes = (h.mes !== undefined) ? MESES[h.mes] : "ANTERIORES";
                let numeroAnio = (h.anio !== undefined) ? h.anio : "";
                let mesAnio = `${nombreMes} ${numeroAnio}`.trim();

                if (mesAnio !== ultimoMesAnio) {
                    htmlHist += `<div class="month-header">${mesAnio}</div>`;
                    ultimoMesAnio = mesAnio;
                }
                htmlHist += `<div class="hist-item"><span>${h.f}</span> <b>$${h.m}</b></div>`;
            });
            document.getElementById('historyList').innerHTML = htmlHist || '<div style="text-align:center;padding:10px;color:#666">SIN REGISTROS</div>';
        }

        function testSound() { document.getElementById('cashSound').play(); }
        document.getElementById('goal').value = localStorage.getItem('metaJhon') || 1.00;
        document.getElementById('withdrawTarget').value = localStorage.getItem('retiroJhon') || 13.00;
        document.getElementById('goal').addEventListener('input', calcular);
        document.getElementById('withdrawTarget').addEventListener('input', calcular);
        calcular();
    </script>
</body>
</html>
