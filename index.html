<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jhonproducer - Terminal Financiera</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --bg-page: #0B1121; --bg-card: #151C2C; --bg-input: #1E293B;
            --text-main: #F8FAFC; --text-muted: #94A3B8; --border-color: #2A3241;
            --accent-blue: #3B82F6; --accent-green: #10B981;
            --accent-yellow: #F59E0B; --accent-red: #EF4444;
            --shadow-card: 0 8px 25px -8px rgba(0,0,0,0.6);
            --radius-main: 16px; --radius-sm: 8px;
        }
        [data-theme="light"] {
            --bg-page: #F3F4F6; --bg-card: #FFFFFF; --bg-input: #F9FAFB;
            --text-main: #111827; --text-muted: #6B7280; --border-color: #E5E7EB;
            --shadow-card: 0 8px 20px -5px rgba(0,0,0,0.05);
        }
        * { box-sizing: border-box; }
        body { 
            background: var(--bg-page); color: var(--text-main); font-family: 'Poppins', sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; overflow-y: auto; overflow-x: hidden; transition: background 0.3s ease;
        }
        .dashboard-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 18px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 16px 24px; border-radius: var(--radius-main); border: 1px solid var(--border-color); box-shadow: var(--shadow-card); }
        .header-title-area { display: flex; align-items: center; gap: 15px; }
        .header h1 { margin: 0; font-size: 1.6rem; color: var(--accent-blue); font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
        .header p { margin: 0; font-size: 1rem; color: var(--text-muted); font-weight: 600; }
        .racha-badge { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); padding: 4px 10px; border-radius: 20px; font-weight: 800; font-size: 0.85rem; border: 1px solid rgba(245, 158, 11, 0.3); display: flex; align-items: center; gap: 4px; }
        
        .controls { display: flex; gap: 12px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-main); padding: 18px; box-shadow: var(--shadow-card); display: flex; flex-direction: column; justify-content: center; }
        .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .stat-value { font-size: 1.7rem; font-weight: 800; line-height: 1.2; }

        .main-grid { display: grid; grid-template-columns: 330px 1fr; gap: 18px; }
        .card-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-main); padding: 20px; box-shadow: var(--shadow-card); display: flex; flex-direction: column; gap: 15px; }
        
        .big-money { font-size: 4.5rem; font-weight: 800; line-height: 1.1; margin: 10px 0; text-align: center; color: var(--accent-yellow); text-shadow: 0 4px 15px rgba(245, 158, 11, 0.25); transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .progress-wrapper { text-align: center; }
        .progress-msg { font-size: 1.1rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; }
        .progress-track { background: var(--bg-input); border-radius: 50px; height: 14px; width: 100%; overflow: hidden; border: 1px solid var(--border-color); }
        .progress-fill { height: 100%; width: 0%; transition: width 0.8s ease, background-color 0.4s ease; }
        
        .goal-row { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 10px 15px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
        .goal-row span { font-weight: 600; font-size: 0.95rem; color: var(--text-muted); }
        .goal-input { background: transparent; border: none; color: var(--text-main); font-size: 1.2rem; font-weight: 700; width: 70px; text-align: right; outline: none; font-family: 'Poppins', sans-serif; border-bottom: 2px solid transparent; transition: border 0.2s; }
        .goal-input:focus { border-bottom: 2px solid var(--accent-blue); }

        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .chart-header span { font-weight: 700; font-size: 1.1rem; }
        .chart-container { position: relative; height: 260px; width: 100%; }

        .btn { padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; border: none; transition: all 0.2s ease; font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 6px; justify-content: center; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline:hover { background: var(--bg-input); color: var(--accent-blue); border-color: var(--accent-blue); }
        .btn-excel { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .btn-excel:hover { background: var(--accent-green); color: white; }
        .btn-manual { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-manual:hover { background: var(--accent-blue); color: white; }
        .btn-logs { background: rgba(245, 158, 11, 0.1); color: var(--accent-yellow); border: 1px solid rgba(245, 158, 11, 0.3); }
        .btn-logs:hover { background: var(--accent-yellow); color: white; }

        /* 🔥 NUEVA UI DE ACTIVIDAD VIP */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border-color); padding: 25px; border-radius: var(--radius-main); width: 100%; max-width: 480px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); max-height: 85vh; display: flex; flex-direction: column; }
        .modal-title { margin: 0 0 15px 0; font-size: 1.3rem; font-weight: 800; color: var(--text-main); text-align: center; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: var(--accent-red); }
        
        .log-section-title { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin: 15px 0 10px 0; letter-spacing: 1px; }
        
        /* Sistema de Smart Cards */
        .task-cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 15px; }
        .task-card { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 12px; transition: transform 0.2s; }
        .task-card:hover { transform: translateY(-2px); border-color: var(--accent-blue); }
        .task-qty { background: var(--accent-blue); color: white; font-size: 1.2rem; font-weight: 800; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4); }
        .task-info { display: flex; flex-direction: column; }
        .task-price { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; }
        .task-total { font-size: 1.1rem; color: var(--accent-green); font-weight: 800; }

        .fee-card { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: var(--radius-sm); padding: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .fee-card span { color: var(--accent-red); font-weight: 700; font-size: 0.9rem; }
        .fee-card .fee-total { font-size: 1.2rem; font-weight: 800; }

        /* Timeline simplificada */
        .log-timeline { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-input); padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; border-left: 3px solid var(--border-color); }
        .log-item.retiro { border-left-color: var(--accent-gold); }
        .log-time { color: var(--text-muted); font-size: 0.75rem; font-weight: 600; width: 70px; }
        .log-desc { flex-grow: 1; font-weight: 600; color: var(--text-main); }
        .log-amount { font-weight: 800; }
        
        .log-timeline::-webkit-scrollbar { width: 6px; }
        .log-timeline::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body data-theme="dark">
    <div class="dashboard-container">
        <header class="header">
            <div class="header-title-area">
                <div>
                    <h1 id="txtDia">FECHA</h1>
                    <p id="txtDateTime">--:--</p>
                </div>
                <div class="racha-badge" id="badgeRacha">🔥 Racha: 0</div>
            </div>
            <div class="controls">
                <button class="btn btn-logs" onclick="openLogModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Actividad Diaria
                </button>
                <button class="btn btn-manual" onclick="openManualModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                    Ajuste
                </button>
                <button class="btn btn-excel" onclick="exportarExcelPro()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h8"></path><path d="M8 17h8"></path><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Excel
                </button>
                <button class="btn btn-outline" onclick="toggleTheme()">🌓 Tema</button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card" style="border-bottom: 3px solid var(--accent-blue);">
                <span class="stat-label">EN GANADO (Retirable)</span>
                <span class="stat-value" id="valEarned" style="color: var(--text-main);">$0.00</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">PENDIENTE</span>
                <span class="stat-value" id="valPending" style="color: var(--text-muted);">$0.00</span>
            </div>
            <div class="stat-card" style="border-bottom: 3px solid var(--accent-green); background: rgba(16, 185, 129, 0.03);">
                <span class="stat-label" style="color: var(--accent-green);">SALDO REAL TOTAL</span>
                <span class="stat-value" id="valTotalReal" style="color: var(--accent-green);">$0.00</span>
            </div>
        </section>

        <section class="main-grid">
            <div class="card-panel">
                <div style="text-align: center; margin-top: 10px;">
                    <span class="stat-label" style="color: var(--accent-yellow);">TRABAJO DE HOY</span>
                    <div class="big-money" id="gananciaHoy">$0.00</div>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-msg" id="message">---</div>
                    <div class="progress-track"><div class="progress-fill" id="fill"></div></div>
                </div>
                <div class="goal-row">
                    <span>META DIARIA: $</span>
                    <input type="number" id="goal" class="goal-input" value="0.50" step="0.10">
                </div>
            </div>

            <div class="card-panel">
                <div class="chart-header">
                    <span style="color: var(--text-main);">Mes Actual: <span id="valMes" style="color: var(--accent-green);">$0.00</span></span>
                    <span style="color: var(--text-muted);">Proyección: <span id="valProyeccion" style="color: var(--accent-blue);">$0.00 🚀</span></span>
                </div>
                <div class="chart-container"><canvas id="historialChart"></canvas></div>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="manualModal">
        <div class="modal-content" style="max-width: 320px;">
            <h3 class="modal-title">Ajuste de Saldo</h3>
            <div style="margin-bottom:15px;">
                <label style="display:block; font-size:0.8rem; font-weight:700; color:var(--text-muted); margin-bottom:5px;">Earned ($)</label>
                <input type="number" id="inputManualEarned" step="0.0001" style="width:100%; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-main); padding:10px; border-radius:var(--radius-sm); font-family:'Poppins'; font-weight:600; outline:none;">
            </div>
            <div style="margin-bottom:15px;">
                <label style="display:block; font-size:0.8rem; font-weight:700; color:var(--text-muted); margin-bottom:5px;">Pending ($)</label>
                <input type="number" id="inputManualPending" step="0.0001" style="width:100%; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-main); padding:10px; border-radius:var(--radius-sm); font-family:'Poppins'; font-weight:600; outline:none;">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-outline" onclick="closeManualModal()" style="color: var(--accent-red); border-color: var(--accent-red); flex: 1;">Cancelar</button>
                <button class="btn btn-excel" onclick="saveManualModal()" style="flex: 1;">Guardar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="logModal">
        <div class="modal-content">
            <h3 class="modal-title">
                Registro de Operaciones
                <button class="close-btn" onclick="closeLogModal()">×</button>
            </h3>
            
            <div class="log-section-title">📊 Producción de Hoy</div>
            <div class="task-cards-grid" id="taskCardsContainer">
                </div>
            
            <div id="feeCardContainer">
                </div>

            <div class="log-section-title">⏱️ Historial Reciente</div>
            <div class="log-timeline" id="logTimelineContainer">
                </div>
        </div>
    </div>

    <audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3" preload="auto"></audio>
    <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>

    <script>
        function toggleTheme() {
            const b = document.body;
            const t = b.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            b.setAttribute('data-theme', t);
            localStorage.setItem('jhonTheme', t);
            renderizarGrafico(parseFloat(document.getElementById('goal').value) || 0.50, parseFloat(document.getElementById('gananciaHoy').innerText.replace('$','')) || 0, true); 
        }

        const MESES = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
        const MESES_ABR = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];

        function getVzlaData() {
            const now = new Date();
            const options = { timeZone: 'America/Caracas' };
            const parts = new Intl.DateTimeFormat('en-US', { ...options, year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(now);
            const y = parts.find(p => p.type === 'year').value;
            const m = parts.find(p => p.type === 'month').value;
            const d = parts.find(p => p.type === 'day').value;
            const idFecha = `${y}-${m}-${d}`;
            const vzlaDate = new Date(now.toLocaleString("en-US", options));
            const diasNom = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];
            let h = vzlaDate.getHours(); const am = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
            const min = vzlaDate.getMinutes().toString().padStart(2, '0');
            const diasEnMes = new Date(vzlaDate.getFullYear(), vzlaDate.getMonth() + 1, 0).getDate();
            const labelFechaPrincipal = `${d} ${MESES_ABR[vzlaDate.getMonth()]} (${diasNom[vzlaDate.getDay()]})`;
            
            return { id: idFecha, mesIdx: vzlaDate.getMonth(), anio: vzlaDate.getFullYear(), labelPrincipal: labelFechaPrincipal, hora: `${h}:${min} ${am}`, diaNumero: vzlaDate.getDate(), totalDiasMes: diasEnMes };
        }

        const info = getVzlaData();
        document.getElementById('txtDia').innerText = info.labelPrincipal;
        document.getElementById('txtDateTime').innerText = info.hora;
        document.body.setAttribute('data-theme', localStorage.getItem('jhonTheme') || 'dark');

        let base = parseFloat(localStorage.getItem('baseJhon')) || 0;
        let historial = JSON.parse(localStorage.getItem('histJhon')) || [];
        let actividadHoy = JSON.parse(localStorage.getItem('actividadJhon')) || [];

        function registrarActividad(tipo, monto) {
            const timeInfo = getVzlaData();
            actividadHoy.unshift({ hora: timeInfo.hora, tipo: tipo, monto: parseFloat(monto) });
            // Guardar máximo las últimas 100 acciones del día para no saturar
            actividadHoy = actividadHoy.slice(0, 100);
            localStorage.setItem('actividadJhon', JSON.stringify(actividadHoy));
            if (document.getElementById('logModal').style.display === 'flex') { renderizarLogs(); }
        }

        function auditarCierreDia() {
            let e = parseFloat(localStorage.getItem('lastEarnedJhon')) || 0;
            let p = parseFloat(localStorage.getItem('lastPendingJhon')) || 0;
            let totalA = e + p;
            let ultimaFecha = localStorage.getItem('fechaJhon');
            
            if (ultimaFecha && ultimaFecha !== info.id) {
                let fUltima = new Date(ultimaFecha + "T12:00:00");
                let fHoy = new Date(info.id + "T12:00:00");
                
                if (fUltima < fHoy) { 
                    const ganadoAyer = Math.max(0, totalA - base);
                    historial.unshift({ f: ultimaFecha, m: ganadoAyer.toFixed(2), mes: fUltima.getMonth(), anio: fUltima.getFullYear() });
                    
                    fUltima.setDate(fUltima.getDate() + 1);
                    while(fUltima < fHoy) {
                        let y = fUltima.getFullYear(); let m_num = String(fUltima.getMonth() + 1).padStart(2, '0'); let d_num = String(fUltima.getDate()).padStart(2, '0');
                        historial.unshift({ f: `${y}-${m_num}-${d_num}`, m: "0.00", mes: fUltima.getMonth(), anio: fUltima.getFullYear() });
                        fUltima.setDate(fUltima.getDate() + 1);
                    }
                    
                    historial = historial.slice(0, 90); 
                    localStorage.setItem('histJhon', JSON.stringify(historial));
                    base = totalA; localStorage.setItem('baseJhon', base);
                    localStorage.setItem('fechaJhon', info.id);
                    
                    // Limpieza Diaria de Actividad
                    actividadHoy = []; localStorage.setItem('actividadJhon', JSON.stringify(actividadHoy));
                }
            }
            if (base === 0 && totalA > 0) { base = totalA; localStorage.setItem('baseJhon', base); }
            if (!ultimaFecha) { localStorage.setItem('fechaJhon', info.id); }
        }
        auditarCierreDia();

        let miGrafico; 
        let memoriaEarned = parseFloat(localStorage.getItem('lastEarnedJhon')) || null;
        let memoriaPending = parseFloat(localStorage.getItem('lastPendingJhon')) || null;

        function calcularRacha(goal, hoyRedondeo) {
            let racha = 0;
            if (hoyRedondeo >= goal) racha++;
            let dCheck = new Date(info.id + "T12:00:00"); dCheck.setDate(dCheck.getDate() - 1);
            for(let i=0; i<30; i++) {
                let y = dCheck.getFullYear(); let m = String(dCheck.getMonth() + 1).padStart(2, '0'); let d = String(dCheck.getDate()).padStart(2, '0');
                let record = historial.find(h => h.f === `${y}-${m}-${d}`);
                if (record && parseFloat(record.m) >= goal) { racha++; dCheck.setDate(dCheck.getDate() - 1); } 
                else break;
            }
            document.getElementById('badgeRacha').innerText = `🔥 Racha: ${racha}`;
        }

        function calcularMetricas() {
            const goal = parseFloat(document.getElementById('goal').value) || 0.50;
            localStorage.setItem('metaJhon', goal);
            
            let e = parseFloat(localStorage.getItem('lastEarnedJhon')) || 0;
            let p = parseFloat(localStorage.getItem('lastPendingJhon')) || 0;
            let totalActual = e + p;
            
            // 🔥 MOTOR DETECTIVE DE ALTA VELOCIDAD Y MATEMÁTICA DE RETIROS
            if (memoriaEarned !== null && memoriaPending !== null) {
                let deltaE = Math.round((e - memoriaEarned) * 10000) / 10000;
                let deltaP = Math.round((p - memoriaPending) * 10000) / 10000;

                if (deltaP > 0) { registrarActividad('tarea', deltaP); }
                
                if (deltaE < 0) {
                    let caida = Math.abs(deltaE);
                    if (caida >= 5.00) {
                        // ¡ES UN RETIRO! Mantenemos tu "Trabajo de Hoy" intacto.
                        base = base - caida; 
                        localStorage.setItem('baseJhon', base);
                        registrarActividad('retiro', caida);
                    } else if (caida < 0.50) {
                        // Congelaste un cupo (Fee)
                        registrarActividad('fee', caida);
                    }
                }
            }
            memoriaEarned = e; memoriaPending = p;

            // Salvaguarda general por si la base se descuadra
            if (totalActual < base) { base = totalActual; localStorage.setItem('baseJhon', base); }
            
            const ganadoHoy = Math.max(0, totalActual - base);
            const hoyRedondeo = Math.round(ganadoHoy * 100) / 100;
            
            const ant = parseFloat(localStorage.getItem('antJhon')) || 0;
            if (hoyRedondeo > ant) { 
                document.getElementById('cashSound').play().catch(er=>{}); 
                document.getElementById('gananciaHoy').style.transform = "scale(1.1)";
                setTimeout(() => { document.getElementById('gananciaHoy').style.transform = "scale(1)"; }, 200);
            }
            localStorage.setItem('antJhon', hoyRedondeo);
            
            document.getElementById('gananciaHoy').innerText = '$' + hoyRedondeo.toFixed(2);
            document.getElementById('valEarned').innerText = '$' + e.toFixed(4);
            document.getElementById('valPending').innerText = '$' + p.toFixed(4);
            document.getElementById('valTotalReal').innerText = '$' + totalActual.toFixed(4);
            
            const pct = Math.min((ganadoHoy / goal) * 100, 100);
            document.getElementById('fill').style.width = pct + '%';
            if(pct < 35) document.getElementById('fill').style.backgroundColor = "var(--accent-red)";
            else if(pct < 99) document.getElementById('fill').style.backgroundColor = "var(--accent-yellow)";
            else document.getElementById('fill').style.backgroundColor = "var(--accent-green)";
            
            document.getElementById('message').innerText = ganadoHoy >= goal ? "¡OBJETIVO ALCANZADO! 🏆" : `Faltan $${(goal - ganadoHoy).toFixed(2)}`;
            
            let sumMes = hoyRedondeo;
            for(let i = 1; i < info.diaNumero; i++) {
                let m_num = String(info.mesIdx + 1).padStart(2, '0'); let d_num = String(i).padStart(2, '0');
                let record = historial.find(h => h.f === `${info.anio}-${m_num}-${d_num}`);
                sumMes += record ? parseFloat(record.m) : 0;
            }
            
            document.getElementById('valMes').innerText = '$' + sumMes.toFixed(2);
            document.getElementById('valProyeccion').innerText = '$' + ((sumMes / info.diaNumero) * info.totalDiasMes).toFixed(2);
            
            calcularRacha(goal, hoyRedondeo);
            renderizarGrafico(goal, hoyRedondeo, false);
        }

        function renderizarGrafico(goal, hoyRedondeo, forzarDestruir = false) {
            const ctx = document.getElementById('historialChart').getContext('2d');
            let labels = []; let values = []; let pointColors = []; let bandaObjetivo = [];
            for(let i = 1; i <= info.totalDiasMes; i++) {
                let m_num = String(info.mesIdx + 1).padStart(2, '0'); let d_num = String(i).padStart(2, '0');
                let dObj = new Date(`${info.anio}-${m_num}-${d_num}T12:00:00`);
                labels.push(`${d_num} (${["DOM", "LUN", "MAR", "MIE", "JUE", "VIE", "SAB"][dObj.getDay()]})`);
                bandaObjetivo.push(goal); 
                if (i < info.diaNumero) {
                    let record = historial.find(h => h.f === `${info.anio}-${m_num}-${d_num}`);
                    let val = record ? parseFloat(record.m) : 0.00;
                    values.push(val); pointColors.push(val >= goal ? '#10B981' : (val === 0 ? '#EF4444' : '#F59E0B'));
                } else if (i === info.diaNumero) {
                    values.push(hoyRedondeo); pointColors.push(hoyRedondeo >= goal ? '#10B981' : (hoyRedondeo === 0 ? '#EF4444' : '#F59E0B'));
                } else { values.push(null); pointColors.push('transparent'); }
            }

            const isLight = document.body.getAttribute('data-theme') === 'light';
            
            if (miGrafico && !forzarDestruir) {
                miGrafico.data.labels = labels; miGrafico.data.datasets[0].data = values; miGrafico.data.datasets[0].pointBackgroundColor = pointColors;
                miGrafico.data.datasets[0].pointBorderColor = isLight ? '#FFFFFF' : '#151C2C'; miGrafico.data.datasets[1].data = bandaObjetivo;
                miGrafico.update('none'); return;
            }

            if (miGrafico) miGrafico.destroy();
            let gradientFill = ctx.createLinearGradient(0, 0, 0, 260);
            gradientFill.addColorStop(0, 'rgba(59, 130, 246, 0.4)'); gradientFill.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            miGrafico = new Chart(ctx, {
                type: 'line',
                data: { labels: labels, datasets: [ { label: 'Ganancia ($)', data: values, backgroundColor: gradientFill, borderColor: '#3B82F6', borderWidth: 3, pointBackgroundColor: pointColors, pointBorderColor: isLight ? '#FFFFFF' : '#151C2C', pointBorderWidth: 2, pointRadius: 5, pointHoverRadius: 8, fill: true, tension: 0.4 }, { label: 'Banda Meta', data: bandaObjetivo, borderColor: '#F59E0B', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, pointHoverRadius: 0, fill: false, tension: 0 } ] },
                options: { interaction: { mode: 'index', intersect: false }, animation: { duration: 600 }, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: isLight ? 'rgba(255,255,255,0.95)' : 'rgba(21,28,44,0.95)', titleColor: isLight ? '#111827' : '#F8FAFC', bodyColor: isLight ? '#111827' : '#F8FAFC', borderColor: isLight ? '#E5E7EB' : '#2A3241', borderWidth: 1, titleFont: { size: 12 }, bodyFont: { size: 14, weight: 'bold' }, padding: 10, cornerRadius: 8, callbacks: { label: function(c) { return c.dataset.label + ': $' + c.parsed.y.toFixed(2); } } } }, scales: { y: { beginAtZero: true, grid: { color: isLight ? '#E5E7EB' : '#2A3241', drawBorder: false }, ticks: { color: isLight ? '#6B7280' : '#94A3B8', font: { family: 'Poppins', weight: '600' }, callback: function(v) { return '$' + v; } } }, x: { grid: { display: false }, ticks: { color: isLight ? '#6B7280' : '#94A3B8', font: { family: 'Poppins', weight: '600' }, maxRotation: 0, maxTicksLimit: 15 } } } }
            });
        }

        // 🔥 FUNCIONES DE LA NUEVA UI DE ACTIVIDAD VIP
        function openLogModal() { renderizarLogs(); document.getElementById('logModal').style.display = 'flex'; }
        function closeLogModal() { document.getElementById('logModal').style.display = 'none'; }

        function renderizarLogs() {
            let containerCards = document.getElementById('taskCardsContainer');
            let containerFee = document.getElementById('feeCardContainer');
            let containerTimeline = document.getElementById('logTimelineContainer');
            
            containerCards.innerHTML = ""; containerFee.innerHTML = ""; containerTimeline.innerHTML = "";

            if (actividadHoy.length === 0) {
                containerCards.innerHTML = `<div style="grid-column: span 2; text-align:center; color:var(--text-muted); font-size:0.9rem; padding: 10px;">Aún no hay tareas hoy.</div>`;
                return;
            }

            let conteoTareas = {}; let totalFees = 0;

            actividadHoy.forEach(log => {
                if (log.tipo === 'tarea') {
                    let key = log.monto.toFixed(3); // Precisión de 3 decimales para clasificar
                    if (!conteoTareas[key]) conteoTareas[key] = { cantidad: 0, subtotal: 0 };
                    conteoTareas[key].cantidad++;
                    conteoTareas[key].subtotal += log.monto;
                } else if (log.tipo === 'fee') { totalFees += log.monto; }
            });

            // Dibujar Smart Cards
            for (let precio in conteoTareas) {
                let data = conteoTareas[precio];
                containerCards.innerHTML += `
                    <div class="task-card">
                        <div class="task-qty">${data.cantidad}</div>
                        <div class="task-info">
                            <span class="task-price">Tareas de $${parseFloat(precio).toFixed(2)}</span>
                            <span class="task-total">+$${data.subtotal.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }

            if (totalFees > 0) {
                containerFee.innerHTML = `
                    <div class="fee-card">
                        <span>🔴 Cupos Congelados (Fees)</span>
                        <span class="fee-total">-$${totalFees.toFixed(3)}</span>
                    </div>
                `;
            }

            // Dibujar Timeline Elegante (Solo las últimas 15 acciones para que sea limpio)
            let maxTimeline = actividadHoy.slice(0, 15);
            maxTimeline.forEach(log => {
                let esTarea = log.tipo === 'tarea';
                let esRetiro = log.tipo === 'retiro';
                
                let desc = esTarea ? 'Cobro de Tarea' : (esRetiro ? 'Retiro a Billetera' : 'Cupo Congelado');
                let colorClass = esTarea ? 'color: var(--accent-green)' : (esRetiro ? 'color: var(--accent-gold)' : 'color: var(--accent-red)');
                let borderClass = esTarea ? '' : (esRetiro ? 'retiro' : 'fee');
                let sign = esTarea ? '+' : '-';
                let formatAmount = log.monto < 0.01 ? log.monto.toFixed(3) : log.monto.toFixed(2);
                
                containerTimeline.innerHTML += `
                    <div class="log-item ${borderClass}">
                        <span class="log-time">${log.hora}</span>
                        <span class="log-desc">${desc}</span>
                        <span class="log-amount" style="${colorClass}">${sign}$${formatAmount}</span>
                    </div>
                `;
            });
        }

        // CONTROLADORES MODAL MANUAL
        function openManualModal() {
            document.getElementById('inputManualEarned').value = localStorage.getItem('lastEarnedJhon') || 0;
            document.getElementById('inputManualPending').value = localStorage.getItem('lastPendingJhon') || 0;
            document.getElementById('manualModal').style.display = 'flex';
        }
        function closeManualModal() { document.getElementById('manualModal').style.display = 'none'; }
        function saveManualModal() {
            let e = parseFloat(document.getElementById('inputManualEarned').value) || 0;
            let p = parseFloat(document.getElementById('inputManualPending').value) || 0;
            localStorage.setItem('lastEarnedJhon', e); localStorage.setItem('lastPendingJhon', p);
            calcularMetricas(); closeManualModal();
        }

        // Receptor Cuántico de Tampermonkey
        window.addEventListener('storage', (e) => {
            if (e.key === 'syncTrigger' || e.key === 'lastEarnedJhon' || e.key === 'lastPendingJhon') calcularMetricas();
        });
        
        function exportarExcelPro() {
            // Logica intacta del Excel...
            const goal = parseFloat(document.getElementById('goal').value) || 0.50; let wb = XLSX.utils.book_new();
            let e = parseFloat(localStorage.getItem('lastEarnedJhon')) || 0; let p = parseFloat(localStorage.getItem('lastPendingJhon')) || 0;
            let baseLocal = parseFloat(localStorage.getItem('baseJhon')) || 0; let hoyRedondeo = Math.round(Math.max(0, (e + p) - baseLocal) * 100) / 100;
            let mesesGrp = {}; historial.forEach(h => { let k = `${MESES[h.mes]} ${h.anio}`; if(!mesesGrp[k]) mesesGrp[k] = {}; mesesGrp[k][h.f] = h; });
            let kHoy = `${MESES[info.mesIdx]} ${info.anio}`; if (!mesesGrp[kHoy]) mesesGrp[kHoy] = {};
            mesesGrp[kHoy][info.id] = { f: info.id, m: hoyRedondeo, mes: info.mesIdx, anio: info.anio };
            let totalG = 0; let dExito = 0; let totalDiasEval = 0; let sheetsData = {};
            for(let k in mesesGrp) { 
                let wsD = [["FECHA", "GANANCIA ($)", "META ($)", "¿LOGRADO?"]]; 
                let parts = k.split(" "); let mesIndex = MESES.indexOf(parts[0]); let anio = parseInt(parts[1]);
                let maxDay = (mesIndex === info.mesIdx && anio === info.anio) ? info.diaNumero : new Date(anio, mesIndex + 1, 0).getDate();
                for(let i = maxDay; i >= 1; i--) {
                    let m_str = String(mesIndex + 1).padStart(2, '0'); let d_str = String(i).padStart(2, '0');
                    let fStr = `${anio}-${m_str}-${d_str}`;
                    let m_val = mesesGrp[k][fStr] ? parseFloat(mesesGrp[k][fStr].m) : 0.00;
                    wsD.push([fStr, m_val, goal, m_val >= goal ? "✅ SÍ" : "❌ NO"]);
                    totalG += m_val; if (m_val >= goal) dExito++; totalDiasEval++;
                }
                sheetsData[k] = wsD;
            }
            let wsR = XLSX.utils.aoa_to_sheet([ ["REPORTE SPROUTGIGS"], [], ["MÉTRICA", "RESULTADO"], ["Total Días Evaluados", totalDiasEval], ["Días Meta Cumplida", dExito], ["Total Histórico Trabajado ($)", totalG.toFixed(2)] ]);
            XLSX.utils.book_append_sheet(wb, wsR, "Resumen Global");
            for(let k in sheetsData) { XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheetsData[k]), k); }
            XLSX.writeFile(wb, `SproutGigs_Master_${info.id}.xlsx`);
        }

        document.getElementById('goal').addEventListener('input', calcularMetricas);
        document.getElementById('goal').value = localStorage.getItem('metaJhon') || 0.50;
        calcularMetricas();
    </script>
</body>
