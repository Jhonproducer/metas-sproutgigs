<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jhonproducer - Money Tracker</title>
    <style>
        :root { --primary: #238636; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid #30363d; text-align: center; width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .day-name { color: #58a6ff; font-weight: 800; text-transform: uppercase; font-size: 1.2rem; }
        .total-hoy { font-size: 5rem; color: var(--primary); font-weight: 900; margin: 10px 0; text-shadow: 0 0 20px rgba(35,134,54,0.4); }
        .progress-bar { background: #30363d; border-radius: 10px; height: 12px; margin: 20px 0; overflow: hidden; }
        #fill { background: linear-gradient(90deg, #238636, #44d664); height: 100%; width: 0%; transition: width 1s ease; }
        .history { margin-top: 20px; background: #0d1117; padding: 15px; border-radius: 12px; border: 1px solid #30363d; text-align: left; font-size: 0.8rem; }
        .status-ok { color: #238636; font-weight: bold; }
        .status-fail { color: #da3633; font-weight: bold; }
        #soundToggle { font-size: 0.7rem; color: #8b949e; cursor: pointer; text-decoration: underline; margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div id="txtDia" class="day-name">---</div>
        <div style="color:#8b949e; font-size:0.9rem" id="txtFecha">--/--/--</div>

        <h2>GANADO HOY:</h2>
        <div class="total-hoy" id="gananciaHoy">$0.00</div>
        
        <div style="font-weight:bold; color:#d29922" id="message">Faltan $--</div>
        <div class="progress-bar"><div id="fill"></div></div>

        <div class="history">
            <div style="text-align:center; color:#8b949e; margin-bottom:10px">HISTORIAL RECIENTE</div>
            <div id="historyList"></div>
        </div>

        <span id="soundToggle" onclick="testSound()">🔊 Haz clic aquí para activar sonido</span>
    </div>

    <audio id="cashSound" src="https://assets.mixkit.co/active_storage/sfx/2017/2017-preview.mp3"></audio>

    <script>
        function getVzlaData() {
            const ahora = new Date();
            const vzla = new Date(ahora.getTime() + (ahora.getTimezoneOffset() * 60000) - (4 * 3600000));
            const dias = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
            return { id: vzla.toISOString().split('T')[0], dia: dias[vzla.getDay()], fecha: vzla.toLocaleDateString('es-VE') };
        }

        const info = getVzlaData();
        document.getElementById('txtDia').innerText = info.dia;
        document.getElementById('txtFecha').innerText = info.fecha;

        const params = new URLSearchParams(window.location.search);
        const earned = parseFloat(params.get('earned')) || 0;
        const pending = parseFloat(params.get('pending')) || 0;
        const totalActual = earned + pending;

        let base = parseFloat(localStorage.getItem('baseJhon'));
        let ultimaFecha = localStorage.getItem('fechaJhon');
        let historial = JSON.parse(localStorage.getItem('histJhon')) || [];
        let meta = 1.00; // Puedes cambiarla aquí

        // AUTO-RESET DIARIO
        if (ultimaFecha && ultimaFecha !== info.id) {
            const ganadoAyer = Math.max(0, totalActual - base);
            historial.unshift({ f: ultimaFecha, m: ganadoAyer.toFixed(2), ok: ganadoAyer >= meta });
            if(historial.length > 3) historial.pop();
            localStorage.setItem('histJhon', JSON.stringify(historial));
            base = totalActual;
            localStorage.setItem('baseJhon', base);
        }

        if (!base) {
            base = totalActual;
            localStorage.setItem('baseJhon', base);
        }
        localStorage.setItem('fechaJhon', info.id);

        function calcular() {
            const ganadoPuro = Math.max(0, totalActual - base);
            const redondeo = Math.round(ganadoPuro * 100) / 100;
            
            // LÓGICA DEL SONIDO $$$
            const anteriorGanado = parseFloat(localStorage.getItem('ultimoGanadoJhon')) || 0;
            if (redondeo > anteriorGanado) {
                document.getElementById('cashSound').play().catch(e => console.log("Clic para activar audio"));
            }
            localStorage.setItem('ultimoGanadoJhon', redondeo);

            document.getElementById('gananciaHoy').innerText = '$' + redondeo.toFixed(2);
            document.getElementById('fill').style.width = Math.min((ganadoPuro / meta) * 100, 100) + '%';
            document.getElementById('message').innerText = ganadoPuro >= meta ? "¡META CUMPLIDA! 🚀" : `Faltan $${(meta - ganadoPuro).toFixed(2)}`;

            document.getElementById('historyList').innerHTML = historial.map(h => `
                <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #1f242b">
                    <span>${h.f}</span> <span class="${h.ok ? 'status-ok' : 'status-fail'}">$${h.m} ${h.ok ? '✓' : '✗'}</span>
                </div>
            `).join('');
        }

        function testSound() {
            document.getElementById('cashSound').play();
            document.getElementById('soundToggle').innerText = "✅ Sonido Activado";
        }

        calcular();
    </script>
</body>
</html>
